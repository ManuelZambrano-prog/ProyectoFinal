{% extends 'tienda/base.html' %}
{% block title %}Crear producto {% endblock %}

{% block content %}

<h1> Crear un producto </h1>
<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}
    <!--Renderizado rápido: cada campo envuelto en <p> con labels y errores-->
    <button type="submit" class="btn primary">Guardar</button>

</form>
<p> <a href="{% url 'tienda:lista_productos' %}" class="btn primary"> Volver a la lista </a></p>
{% endblock %}
